name: Daily US Stock Screener

on:
  schedule:
    # 한국 시간 기준 매일 아침 6시 30분 실행 (월~금장 마감 직후)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 한글 폰트(나눔고딕) 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-nanum
        sudo fc-cache -fv

    - name: 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 미국 주식 스크리너 실행
      run: |
        python main.py

    - name: 실행 결과(index.html 및 리포트) 저장소에 Commit & Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add *.html *.csv
        git status
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated US Screener Report: $(date +'%Y-%m-%d')" && git push)
